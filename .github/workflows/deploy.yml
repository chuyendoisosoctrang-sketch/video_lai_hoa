name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Backend & Test
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Backend Tests
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ --cov=. --cov-report=xml

      # 2. Setup Frontend (Flutter) & Test
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          flutter pub get
      - name: Run Frontend Tests
        run: |
          cd frontend
          flutter test

      # 3. Build Artifacts
      - name: Build Web
        run: |
          cd frontend
          flutter build web --dart-define=API_URL=${{ secrets.API_URL }}
      - name: Build APK
        run: |
          cd frontend
          flutter build apk --release --dart-define=API_URL=${{ secrets.API_URL }}

      # 4. Deploy to Firebase (Web)
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: 'videolaihoa'
          channelId: 'live'
          entryPoint: './frontend'
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # 5. Upload APK to GitHub Releases
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          token: ${{ secrets.GH_PAT_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Cloud Run
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Docker Image
        run: |
          cd backend
          docker build -t gcr.io/videolaihoa/backend-api:latest .
          docker push gcr.io/videolaihoa/backend-api:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend-api
          image: gcr.io/videolaihoa/backend-api:latest
          region: us-central1
          flags: --allow-unauthenticated --memory=512Mi --cpu=1 --concurrency=80
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}
